<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    
    <div id="container" class="w-full h-screen bg-background flex sm:flex-col items-center sm:justify-center relative">
        <div class="bg-boxColor h-150 rounded-2xl p-8 m-8 font-press-star text-text flex flex-col justify-between">
            <div class="flex flex-col gap-4 items-center">
                <button id="playAgain" class="text-sm py-2 px-4 bg-main text-white rounded cursor-pointer">Play Again</button>
                <p class="text-sm">Between 1 - 20</p>
                <p id="luck" class="text-sm"></p>
            </div>
            <div class="flex flex-col gap-4 items-center text-center ">
                <h1 class="text-lg py-4">
                    Guessing You AI Number!
                </h1>
                <h4 id="aiNumberDisplay" class="py-2 px-4 bg-main text-white rounded "></h4>
                <p id="display-all">Start Guessing</p>
            </div>
            <div class="flex flex-col gap-2">
                <div class="flex flex-col">
                    <input id="userNumber" class="border-2 border-main py-2 px-4 focus:none text-sm" type="number" placeholder="00">
                    <button id="checkBtn" class="py-2 px-4 bg-main text-white my-2 rounded cursor-pointer">Check now</button>
                </div>
                <div class="flex flex-col text-center">
                    <p id="score"></p>
                    <p id="highScoreDisplay"></p>
                </div>
                <button id="newGame" class=" text-white bottom-10 right-10 py-2 px-6 bg-main rounded cursor-pointer">New Game</button>
            </div>
        </div>
        

    </div>


    <script src="js/script.js"></script>

</body>
</html>
