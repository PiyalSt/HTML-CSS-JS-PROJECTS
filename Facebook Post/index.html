 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Post</title>

    <!-- tailwind link -->
    <link rel="stylesheet" href="./src/output.css">

    <!-- font-awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    
    <div id="container" class="bg-background py-20 flex justify-center">
        <div class="bg-white w-full max-w-5xl rounded-lg p-4 sm:p-6 md:p-8 lg:p-12 m-6 sm:m-6 md:m-8 lg:m-10 shadow">

            <div class="flex justify-between items-center w-full">
                <div>
                    <h2 class="text-2xl sm:text-3xl md:text-4xl lg:text-6xl font-semibold">Profile</h2>
                </div>
                <div class="">
                    <img class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14" src="./src/assets/profile2.png" alt="">
                </div>
            </div>

            <div class="mt-20">

                <div>
                    <input id="nickName" class="w-full md:w-1/2 lg:w-80 py-2 px-4 rounded-full border border-gray-300 mx-auto lg:ml-20" type="text" placeholder="Nick Name" required>
                </div>

                <div class="flex gap-3 sm:gap-4 lg:gap-6 items-start my-10">
                    <div class="sm:w-14 sm:h-14 md:w-16 md:h-16 lg:w-20 lg:h-20 bg-gray-400 rounded-full overflow-hidden">
                        <img src="./src/assets/profile1.png" alt="">
                    </div>

                    <div class="">
                        <textarea id="textArea" class="w-full text-2xl md:text-2xl lg:text-5xl pt-2 focus:outline-none font-semibold" id=""
                        rows="3" placeholder="What is happening" required></textarea>
                    </div>
                    
                    <div id="selectImgContainer">
                        <div class="w-50 h-38 bg-gray-200 rounded-lg">
                            <img id="showImg" class="w-full h-full object-cover rounded-lg border-none"></img>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-8 sm:flex-row sm:justify-between sm:items-center ">
                    <div class="flex justify-evenly sm:gap-24 md:gap-30 lg:gap-40 lg:ml-20 text-blue-400">
                        <li class="list-none text-2xl lg:text-3xl cursor-pointer">
                            <input type="file" id="imgFile" accept="image/*" class="hidden">
                            <label for="imgFile" class="cursor-pointer">
                                <i class="fa-regular fa-image"></i>
                            </label>
                        </li>
                        <li class="list-none text-2xl lg:text-3xl cursor-pointer">
                            <i class="fa-regular fa-face-smile"></i>
                        </li>
                        <li class="list-none text-2xl lg:text-3xl cursor-pointer">
                            <i class="fa-solid fa-location-dot"></i>
                        </li>
                    </div>
                    <div>
                        <button id="publishBtn" class="w-full sm:w-auto py-2 px-4 bg-blue-600 text-white rounded cursor-pointer hover:bg-blue-700 duration-300">Publish</button>
                    </div>
                </div>
            </div>

            <!-- Post Cart -->
            <div id="postCartContainer"></div>
        </div>
    </div>

    <!-- js link -->
    <script src="./src/js/script.js"></script>
</body>
</html>
