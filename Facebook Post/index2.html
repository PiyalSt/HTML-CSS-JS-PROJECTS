<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Facebook Post</title>

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="./src/output.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body class="bg-gray-100">
  <div class="flex justify-center px-4 py-10">
    <div class="bg-white w-full max-w-2xl rounded-xl p-4 sm:p-6 md:p-8 shadow">
      
      <!-- Header -->
      <div class="flex justify-between items-center">
        <h2 class="text-2xl sm:text-3xl md:text-4xl font-semibold">Profile</h2>
        <img class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14" src="./src/assets/profile2.png" alt="" />
      </div>

      <!-- Input Section -->
      <div class="mt-6">
        <input
          class="w-full py-2 px-4 rounded-full border border-gray-300 focus:outline-none focus:ring-0 focus:border-transparent"
          type="text"
          placeholder="Nick Name"
        />

        <div class="flex gap-3 sm:gap-4 items-start my-6">
          <div class="w-12 h-12 sm:w-14 sm:h-14 md:w-16 md:h-16 bg-gray-400 rounded-full overflow-hidden">
            <img src="./src/assets/profile1.png" alt="" />
          </div>

          <textarea
            class="w-full text-base sm:text-lg md:text-xl pt-2 focus:outline-none font-semibold resize-none"
            rows="3"
            placeholder="What is happening"
          ></textarea>
        </div>

        <!-- Icons + Button -->
        <div class="flex flex-col ">
          <div class="flex gap-6 text-gray-600 text-xl sm:text-2xl">
            <i class="fa-regular fa-image cursor-pointer"></i>
            <i class="fa-regular fa-face-smile cursor-pointer"></i>
            <i class="fa-solid fa-location-dot cursor-pointer"></i>
          </div>

          <button class="w-full sm:w-auto py-2 px-6 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
            Publish
          </button>
        </div>
      </div>

      <!-- Post Card -->
      <div class="my-8 border-t pt-6">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gray-400 rounded-full overflow-hidden">
              <img src="./src/assets/profile1.png" alt="" />
            </div>
            <div class="flex gap-2 text-sm sm:text-base">
              <span>name</span>
              <span class="text-gray-500">date</span>
            </div>
          </div>

          <i class="fa-solid fa-ellipsis-vertical cursor-pointer"></i>
        </div>

        <div class="my-4 text-sm sm:text-base">
          results
        </div>

        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
          <div class="flex gap-6 text-lg sm:text-xl">
            <i class="fa-regular fa-heart cursor-pointer"></i>
            <i class="fa-regular fa-comment cursor-pointer"></i>
            <i class="fa-solid fa-share-nodes cursor-pointer"></i>
          </div>

          <button class="w-full sm:w-auto py-2 px-4 bg-red-600 text-white rounded hover:bg-red-700 transition">
            Delete
          </button>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
