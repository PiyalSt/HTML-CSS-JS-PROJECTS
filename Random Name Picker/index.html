<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Name Picker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Random Name Picker</h2>
      <div class="input-field">
        <div>
          <h4>Write Names</h4>
          <textarea
            name=""
            id="input-name"
            placeholder="নামগুলো কমা দিয়ে লিখো"
          ></textarea>
        </div>
        <button class="pickBtn">Pick a name</button>
      </div>

      <div class="show result"></div>
    </div>

    <!-- js link -->
    <script src="script.js"></script>
  </body>
</html>
