<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Counter</title>

    <!-- tailwind output css link -->
    <link rel="stylesheet" href="src/output.css">
</head>
<body>
    
    <div class="w-full h-screen bg-gray-900 flex items-center justify-center gap-10">
        <div class="py-4 px-4 text-gray-900 font-bold bg-amber-400 rounded text-center bgChanger">
            <h4 class="text-4xl">YouTube</h4>
            <h1 class="text-6xl Counter" data-value="100" data-speed="105"></h1>
        </div>
        <div class="py-4 px-4 text-gray-900 font-bold bg-amber-400 rounded text-center">
            <h4 class="text-4xl">Instagram</h4>
            <h1 class="text-6xl Counter" data-value="500" data-speed="20"></h1>
        </div>
        <div class="py-4 px-4 text-gray-900 font-bold bg-amber-400 rounded text-center">
            <h4 class="text-4xl">Facebook</h4>
            <h1 class="text-6xl Counter" data-value="1000" data-speed="10"></h1>
        </div>
    </div>

    <!-- js link -->
    <script src="src/js/script.js"></script>
</body>
</html>
